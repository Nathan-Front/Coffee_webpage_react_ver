<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <title>Sign Up</title>
  </head>
  <body class="service-body-container">
    <div class="header-nav-container">
      <header>
        <img src="images/index/logo/coffee-cup.png" alt="webpage-logo" />
        <h1 class="web-name">UrKofi</h1>
      </header>
      <nav class="webpage-navigation">
        <ul>
          <li><a href="index.html" class="nav-links">Home</a></li>
          <li><a href="coffeeBeans.html" class="nav-links">Coffee Beans</a></li>
          <li><a href="service.html" class="nav-links">Services</a></li>
          <li><a href="aboutus.html" class="nav-links">About Us</a></li>
          <li>
            <p>
              <a href="#" class="to-login-html-button">Login</a> or
              <a href="signup.html" class="to-register-html-button">Sign up</a>
            </p>
          </li>
        </ul>
        <div class="user-container">
          <div>
            <span>Hi</span>
            <p class="logged-in-user">Guest</p>
          </div>
          <button type="button" class="logout-button">Sign out</button>
        </div>
      </nav>
    </div>
    <main>
      <form id="loginForm" class="login-form" novalidate>
        <h3>Sign In</h3>
        <label for="loginName">User Name</label>
        <input
          type="text"
          id="loginName"
          placeholder="user name"
          autocomplete="new-user-name"
        />
        <label for="loginPassword">Password</label>
        <div class="login-password-container">
          <input
            type="password"
            id="loginPassword"
            placeholder="password"
            autocomplete="new-password"
          />
          <i
            class="fa-solid fa-eye toggle-password"
            data-target="loginPassword"
            role="button"
            tabindex="0"
            id="eye"
          ></i>
        </div>

        <div class="login-button-container">
          <button type="submit">Login</button>
          <button type="button" id="mobile-signup-form">
            Dont have account yet?
          </button>
        </div>
        <label class="login-remember-me">
          <input
            id="remember-me"
            type="checkbox"
            checked="checked"
            name="remember"
          />
          <span>Remember me</span>
        </label>
        <div class="cancel-forgot-container">
          <button type="button" id="login-close-createAccnt-page">
            Cancel
          </button>
          <p>Forgot <a href="#" id="forgot-password">password?</a></p>
        </div>
      </form>
    </main>
    <script src="js/fetchFooter.js" defer></script>
    <script src="js/fetchMobileNav.js" defer></script>
    <script src="js/hashPassword.js" defer></script>
    <script src="js/login.js" defer></script>
    <script src="js/mobileNav.js" defer></script>
    <script src="js/signup.js" defer></script>
    <script src="js/mobileToHome.js" defer></script>
  </body>
</html>
