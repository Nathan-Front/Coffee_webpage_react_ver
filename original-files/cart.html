<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/index.css" />
    <link rel="stylesheet" href="style/cart.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <title>Cart</title>
  </head>
  <body class="service-body-container">
    <div class="header-nav-container">
      <header>
        <img src="images/index/logo/coffee-cup.png" alt="webpage-logo" />
        <h1 class="web-name">UrKofi</h1>
      </header>
      <nav class="webpage-navigation">
        <ul>
          <li><a href="index.html" class="nav-links">Home</a></li>
          <li><a href="coffeeBeans.html" class="nav-links">Coffee Beans</a></li>
          <li><a href="service.html" class="nav-links">Services</a></li>
          <li><a href="aboutus.html" class="nav-links">About Us</a></li>
          <li>
            <p>
              <a href="login.html" class="to-login-html-button">Login</a> or
              <a href="signup.html" class="to-register-html-button">Sign up</a>
            </p>
          </li>
        </ul>
        <div class="user-container">
          <div>
            <span>Hi</span>
            <p class="logged-in-user">Guest</p>
          </div>
          <button type="button" class="logout-button">Sign out</button>
        </div>
      </nav>
    </div>
    <main>
      <h2 class="cart-title" id="cart-page-counter">
        Your cart (
        <span id="cart-item-counter">0</span>
        <span id="cart-item-label">item</span>)
      </h2>
      <section
        class="item-in-cart-container"
        id="cart-item-display-container"
      ></section>
      <section class="cart-checkout-container">
        <div id="cart-compute-fee">
          <p>Sub total: $<span id="sub-total"></span></p>
          <p>Tax: $<span id="tax"></span></p>
          <p>Shipping fee: $<span id="shipping-fee"></span></p>
          <p>Grand Total: $<span id="grand-total"></span></p>
          <button type="button" id="checkout-button">
            Proceed to Checkout
          </button>
        </div>
      </section>
    </main>

    <script src="js/fetchFooter.js" defer></script>
    <script src="js/fetchMobileNav.js" defer></script>
    <script src="js/login.js" defer></script>
    <script src="js/coffeeBeans.js" defer></script>
    <script src="js/mobileNav.js" defer></script>
    <script src="js/signup.js" defer></script>
  </body>
</html>
