<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <link rel="stylesheet" href="style/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <title>Sign Up</title>
  </head>
  <body class="service-body-container">
    <div class="header-nav-container">
      <header>
        <img src="images/index/logo/coffee-cup.png" alt="webpage-logo" />
        <h1 class="web-name">UrKofi</h1>
      </header>
      <nav class="webpage-navigation">
        <ul>
          <li><a href="index.html" class="nav-links">Home</a></li>
          <li><a href="coffeeBeans.html" class="nav-links">Coffee Beans</a></li>
          <li><a href="service.html" class="nav-links">Services</a></li>
          <li><a href="aboutus.html" class="nav-links">About Us</a></li>
          <li>
            <p>
              <a class="to-login-html-button">Login</a> or
              <a href="#" class="to-register-html-button">Sign up</a>
            </p>
          </li>
        </ul>
        <div class="user-container">
          <div>
            <span>Hi</span>
            <p class="logged-in-user">Guest</p>
          </div>
          <button type="button" class="logout-button">Sign out</button>
        </div>
      </nav>
    </div>
    <main>
      <form id="signup-form" class="sign-up-form">
        <h3>Create account</h3>
        <label for="lName">Family Name</label>
        <input
          type="text"
          id="lName"
          class="signup-input"
          name="familyName"
          placeholder="family name"
          required
        />
        <label for="fName">First Name</label>
        <input
          type="text"
          id="fName"
          class="signup-input"
          name="firstName"
          placeholder="first name"
          required
        />
        <label for="mName">Middle Name (Optional)</label>
        <input
          type="text"
          id="mName"
          class="signup-input"
          name="middleName"
          placeholder="middle name"
        />
        <label for="dBirth">Date Of Birth</label>
        <input
          type="date"
          id="dBirth"
          class="signup-input"
          name="bDay"
          placeholder="birth date"
          required
        />
        <label for="cAddress">Current Address</label>
        <input
          type="text"
          id="cAddress"
          class="signup-input"
          name="currentAddress"
          placeholder="current address"
          required
        />

        <label for="eAddress">Email Address</label>
        <div class="email-address-container">
          <input
            type="text"
            id="eAddress"
            class="signup-input"
            name="emailAddress"
            placeholder="email"
            required
          />
          <small class="error"></small>
          <small class="taken"></small>
        </div>

        <label for="cNumber">Contact Number</label>
        <input
          type="text"
          id="cNumber"
          class="signup-input"
          name="contactNumber"
          placeholder="contact #"
          required
        />
        <label for="uName">User Name</label>
        <input
          type="text"
          id="uName"
          class="signup-input"
          name="userName"
          placeholder="user name"
          autocomplete="new-user-name"
          required
        />
        <label for="pWord">Password</label>
        <div class="password-container">
          <input
            type="password"
            id="pWord"
            class="signup-input"
            name="password"
            placeholder="password"
            autocomplete="new-password"
            required
          />
          <i
            class="fa-solid fa-eye toggle-password"
            data-target="pWord"
            role="button"
            tabindex="0"
            id="eye"
          ></i>
        </div>

        <div class="submit-button-container">
          <button type="submit" id="create-button">Create account</button>
          <button type="reset" id="reset-button">Reset</button>
        </div>
      </form>
    </main>
    <script src="js/fetchFooter.js" defer></script>
    <script src="js/fetchMobileNav.js" defer></script>
    <script src="js/mobileNav.js" defer></script>
    <script src="js/mobileToHome.js" defer></script>
    <script src="js/hashPassword.js" defer></script>
    <script src="js/signup.js" defer></script>
    <script src="js/login.js" defer></script>
  </body>
</html>
